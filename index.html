<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포트폴리오</title>
  <style>
    :root {
      --bg-main: #f8f3ea;
      --bg-accent: #efe6d8;
      --text-main: #1f252b;
      --text-sub: #53606a;
      --card-bg: #ffffff;
      --line: #d8c9b5;
      --point: #bf5a3c;
      --point-dark: #8f4029;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 20%, rgba(191, 90, 60, 0.2), transparent 36%),
        radial-gradient(circle at 80% 0%, rgba(91, 143, 121, 0.14), transparent 34%),
        linear-gradient(160deg, var(--bg-main), var(--bg-accent));
      min-height: 100vh;
      line-height: 1.6;
    }

    .wrapper {
      max-width: 940px;
      margin: 0 auto;
      padding: 36px 20px 52px;
      animation: show-up 0.7s ease-out;
    }

    @keyframes show-up {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      padding: 34px 28px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(6px);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -56px;
      bottom: -56px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(191, 90, 60, 0.12);
    }

    .hero-title {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      color: var(--text-sub);
      font-size: 1.02rem;
    }

    .profile {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .profile-item {
      border: 1px solid #e9dcc9;
      background: rgba(255, 252, 247, 0.9);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .profile-label {
      display: block;
      font-size: 0.82rem;
      color: #816c54;
      margin-bottom: 2px;
    }

    .profile-value {
      font-size: 0.96rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 12px 26px rgba(75, 51, 24, 0.08);
      animation: reveal 0.6s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) {
      animation-delay: 0.3s;
      grid-column: 1 / -1;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-title {
      font-size: 1.15rem;
      margin-bottom: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--point-dark);
    }

    .section-title::before {
      content: "";
      width: 6px;
      height: 20px;
      border-radius: 4px;
      background: var(--point);
    }

    .list {
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .list-item {
      border: 1px solid #eee3d2;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fffcf7;
    }

    .item-main {
      font-weight: 700;
      font-size: 1rem;
    }

    .item-sub {
      font-size: 0.93rem;
      color: var(--text-sub);
      margin-top: 3px;
    }

    .footer {
      margin-top: 18px;
      text-align: right;
      color: #7f725f;
      font-size: 0.88rem;
    }

    @media (max-width: 780px) {
      .wrapper {
        padding: 24px 14px 40px;
      }

      .profile {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .card:nth-child(3) {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <section class="hero">
      <h1 class="hero-title">Portfolio</h1>
      <p class="hero-subtitle">학력, 경력, 프로젝트 이력을 정리한 소개 페이지입니다.</p>
      <div class="profile">
        <div class="profile-item">
          <span class="profile-label">이름</span>
          <span class="profile-value">하헌진</span>
        </div>
        <div class="profile-item">
          <span class="profile-label">연락처</span>
          <span class="profile-value">010-3362-8225</span>
        </div>
        <div class="profile-item">
          <span class="profile-label">이메일</span>
          <span class="profile-value">hunjin.ha@gm.com</span>
        </div>
      </div>
    </section>

    <section class="cards">
      <article class="card">
        <h2 class="section-title">학력</h2>
        <ul class="list">
          <li class="list-item">
            <div class="item-main">명지대학교 전자공학과 학사</div>
          </li>
        </ul>
      </article>

      <article class="card">
        <h2 class="section-title">경력</h2>
        <ul class="list">
          <li class="list-item">
            <div class="item-main">엘지디스플레이</div>
            <div class="item-sub">2005년 ~ 2007년</div>
          </li>
          <li class="list-item">
            <div class="item-main">한국지엠</div>
            <div class="item-sub">2007년 ~ 현재</div>
          </li>
        </ul>
      </article>

      <article class="card">
        <h2 class="section-title">프로젝트 이력</h2>
        <ul class="list">
          <li class="list-item">
            <div class="item-main">31CC2 BODY SIDE LOCK PLR INR 금형 제작</div>
          </li>
          <li class="list-item">
            <div class="item-main">T1CCF2-SIL BSO 금형 제작</div>
          </li>
        </ul>
      </article>
    </section>

    <p class="footer">Last Updated · 2026-07-09</p>
  </main>
</body>
</html>
